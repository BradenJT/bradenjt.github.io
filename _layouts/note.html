---
layout: default
---
<article>
  <header class="article-header">
    <h1 class="article-title">{{ page.title }}</h1>
    <p class="content-meta">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.source %}<span>·</span> {{ page.source }}{% endif %}
    </p>
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
