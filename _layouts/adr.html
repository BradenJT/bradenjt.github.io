---
layout: default
---
<article>
  <header class="article-header">
    <h1 class="article-title">{{ page.title }}</h1>
    <p class="content-meta">
      {{ page.date | date: "%Y-%m-%d" }}
      <span class="adr-status adr-status--{{ page.status | downcase }}">{{ page.status }}</span>
    </p>
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
