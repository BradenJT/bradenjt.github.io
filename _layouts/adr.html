---
layout: default
---
<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p class="content-meta">
      {{ page.date | date: "%Y-%m-%d" }} &nbsp;·&nbsp;
      <span class="adr-status adr-status--{{ page.status | downcase }}">{{ page.status }}</span>
    </p>
  </header>
  {{ content }}
</article>
