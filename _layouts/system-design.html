---
layout: default
---
<article>
  <header class="article-header">
    <h1 class="article-title">{{ page.title }}</h1>
    <p class="content-meta">By {{ page.author }}</p>
    <p class="content-meta">Project: {{ page.project }}</p>
    <p class="content-meta">Status: {{ page.status }}</p>
    <p class="content-meta">{{ page.date | date: "%B %d, %Y" }}</p>
    <p class="content-meta">Version: {{ page.version }}</p>
    
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
