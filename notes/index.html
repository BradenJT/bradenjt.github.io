---
layout: default
title: Notes
---
<div class="index-header">
  <h1 class="index-title">Notes</h1>
  <p class="index-desc">Book notes and study summaries. Lower polish bar — the goal is externalizing understanding.</p>
</div>
<ul class="post-list">
  {% for note in site.notes %}
    <li class="post-list-item">
      <a href="{{ note.url | relative_url }}">{{ note.title }}</a>
      <span class="post-list-meta">{{ note.date | date: "%B %d, %Y" }}</span>
    </li>
  {% endfor %}
</ul>
